<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>siri-api web UI</title>
    <link rel="icon" href="/favicon.ico">
    <style>
      body { font-family: system-ui, Arial; margin: 24px; }
      input, button, textarea { font-size: 1rem; }
      label { display:block; margin-top:12px }
    </style>
  </head>
  <body>
    <h1>siri-api web UI</h1>
    <label>Server base URL (include https:// if using ngrok):
      <input id="base" style="width:100%" value="https://YOUR_SERVER" />
    </label>

    <label>API Key:
      <input id="key" style="width:100%" placeholder="enter API key (not committed)" />
    </label>

    <label>Text to speak (/say):
      <input id="sayText" style="width:100%" value="Hello from web UI" />
    </label>
    <button id="sayBtn">Call /say and Speak</button>

    <label>Text for note (/note):
      <textarea id="noteText" rows="4" style="width:100%">Hello from Siri via web UI</textarea>
    </label>
    <button id="noteBtn">Create Desktop Note</button>

    <pre id="result" style="background:#f7f7f7;padding:12px;margin-top:12px;border:1px solid #eee"></pre>

    <script src="script.js"></script>
  </body>
</html>
